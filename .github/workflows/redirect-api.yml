name: Redirect API

on:
  push:
    branches:
      - main
    paths: 
      - RedirectApi/**
  pull_request:
    branches:
      - main
    paths: 
      - RedirectApi/**
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      
      - name: Restore dependencies
        run: dotnet restore
      
      - name: Build
        run: dotnet build --no-restore
      
      - name: Test
        run: dotnet test --no-build --verbosity normal
      
      - name: Publish
        run: dotnet publish RedirectApi/src/UrlShortener.RedirectApi -c Release -o ${{ env.DOTNET_ROOT }}/myapp
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4 
        with:
          name: .net-app
          path: ${{ env.DOTNET_ROOT }}/myapp
      
  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    environment: Development
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.REDIRECT_API_RESOURCE_NAME }}
          publish-profile: ${{ secrets.AZURE_REDIRECT_API_PUBLISH_PROFILE }}
          slot-name: 'Production'
          package: .